<div class="flex flex-col justify-center items-center gap-y-2">
    <!-- 1. TOP BLOCK: Correctly opened and closed horizontal row -->
    <div class="flex flex-row items-center justify-center">
        {{- range $links := .Site.Params.Author.links -}}
        {{- range $name, $url := $links -}}
            <a class="px-2 text-neutral-400 hover:text-neutral-600 dark:hover:text-neutral-300" 
                href="{{ $url | safeURL }}" 
                target="_blank" 
                aria-label="{{ $name | title }}" 
                rel="me noopener noreferrer">
                {{ partial "icon.html" $name }}
            </a>
        {{- end -}}
        {{- end -}}
    </div> <!-- Fixed the bracket here! -->

    <a class="mt-2 inline-flex items-center px-3 py-1 text-sm font-medium rounded-full border border-neutral-300 hover:border-neutral-500 dark:border-neutral-700 dark:hover:border-neutral-500 text-neutral-600 dark:text-neutral-300 hover:bg-neutral-100 dark:hover:bg-neutral-800 transition-colors duration-200" 
       href="/My_CV.pdf" 
       download="My_CV.pdf">
      
      <span class="mr-2.5 flex items-center justify-center w-4 h-4 text-neutral-400">
        {{ partial "icon.html" "download" }}
      </span>
      
      <span>Download CV</span>
    </a>
</div>
