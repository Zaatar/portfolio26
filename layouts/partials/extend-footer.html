<canvas id="bg-animation" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; pointer-events: none;"></canvas>

<script>
  window.addEventListener('DOMContentLoaded', () => {
    const canvas = document.getElementById('bg-animation');
    const ctx = canvas.getContext('2d');
    
    // 1. Declare the particles array globally within this wrapper scope
    let particles = [];
    
    // 2. The Setup / Initialization Function
    function init() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      
      // Determine device type and set density throttle rule
      const isMobile = window.innerWidth < 768;
      const particleCount = isMobile ? 40 : 80; 

      // Reset the array (crucial for when browser window resizes)
      particles = [];

      // Generate the freshly scaled array list
      for (let i = 0; i < particleCount; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          radius: Math.random() * 2 + 1,
          vx: (Math.random() - 0.5) * 0.5,
          vy: (Math.random() - 0.5) * 0.5
        });
      }
    }

    // 3. The Animation Loop
    function animate() {
      // Freeze engine processing completely if the tab isn't active
      if (document.hidden) { 
        requestAnimationFrame(animate); 
        return; 
      }

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'rgba(150, 150, 150, 0.3)'; 

      particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;

        if (p.x < 0) p.x = canvas.width;
        if (p.x > canvas.width) p.x = 0;
        if (p.y < 0) p.y = canvas.height;
        if (p.y > canvas.height) p.y = 0;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fill();
      });

      requestAnimationFrame(animate);
    }

    // 4. Hook up listeners and fire up execution
    window.addEventListener('resize', init); // Re-run init when window boundaries scale
    
    init();    // Setup data arrays first
    animate(); // Start drawing frames next
  });
</script>
